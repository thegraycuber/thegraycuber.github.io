<html>
    <head>
    <link rel="stylesheet" href="mystyle.css">

    <script src='qter_presentation/main.js' type='text/javascript'></script>
    <script src='qter_presentation/controls.js' type='text/javascript'></script>
    <script src='qter_presentation/modules.js' type='text/javascript'></script>
    <script src='qter_presentation/present.js' type='text/javascript'></script>
    <script src='qter_presentation/proj/cube.js' type='text/javascript'></script>

    <script src='core/color.js' type='text/javascript'></script>
    <script src='core/toolbox.js' type='text/javascript'></script>

    <script src='https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.js' type='text/javascript'></script>
    <script src='https://cdn.jsdelivr.net/npm/p5@1.11.7/lib/addons/p5.sound.min.js' type='text/javascript'></script>
    <meta name='viewport' content='user-scalable=no,initial-scale=1,
    maximum-scale=1,minimum-scale=1,width=device-width'>
    </head>
<body style="background-color: #20213f;">

    <div id="help-box" style="
        position:absolute;
        bottom:0;
        left:0;
        color:#c8caf4;
        font-family: 'Courier New', Courier, monospace;
        background-color:#20213f;
        border-color:#8498ef;
        border-style: solid;
        border-width: 2px;
        border-radius: 10px;
        margin: 5px;
        padding: 5px;
        ">
    <p id="slide-counter" style="font-weight: bold; text-align: center;">Slide 1/1</p>
    <p style="font-weight: bold; text-align: center;">Controls:</p>
    <ul>
        <li>Space, PgDn, Down, Right: Next Slide</li>
        <li>Backspace, PgUp, Up, Left: Prior Slide</li>
        <li>Ctrl+: Move by 10</li>
        <li>Ctrl+ Shift+: Move by Max</li>
        <li>Effle Evan: Fullscreen</li>
        <li>+: Show Me</li>
        <li>-: Hide Me</li>
    </ul>
    </div>
</body>

</html>
